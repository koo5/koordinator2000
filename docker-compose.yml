services:
  # ---------------------------------------------------------------------------
  # Data plane: self-hosted Postgres + Hasura.
  # SECURITY: both are bound to 127.0.0.1 ONLY. Nothing here is reachable from
  # the internet or the LAN. They talk to each other over the private
  # `koord_net` bridge. Do NOT change the host binds to 0.0.0.0 without putting
  # a reverse proxy + TLS + firewall in front (see docs/INFRA.md).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.8-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-koordinator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-koordinator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # host-only, non-default port (5432 is taken by another project)
      - "127.0.0.1:5434:5432"
    networks:
      - koord_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koordinator} -d ${POSTGRES_DB:-koordinator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  hasura:
    image: hasura/graphql-engine:v2.44.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - koord_net
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER:-koordinator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koordinator}
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://${POSTGRES_USER:-koordinator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koordinator}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:?set HASURA_ADMIN_SECRET in .env}
      # Console is safe to enable because the port is bound to localhost only.
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      # Hardening: no verbose internal errors, no anonymous role, no phone-home.
      HASURA_GRAPHQL_DEV_MODE: "false"
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, webhook-log, websocket-log"
      HASURA_GRAPHQL_CORS_DOMAIN: "http://localhost:5533, http://localhost:5000"

  # ---------------------------------------------------------------------------
  # Migration runner. Applies db/migrations/*.sql to the local Postgres above.
  # To load the April data dump, use scripts/db-init.sh (it restores first,
  # THEN migrates). A bare `docker compose up` on an EMPTY volume will instead
  # build the schema fresh from migrations — fine for a blank start.
  # ---------------------------------------------------------------------------
  migrations:
    build:
      context: .
      dockerfile: ./docker/migrations.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-koordinator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koordinator}
    networks:
      - koord_net
    volumes:
      - ./db:/app/db

  # Webapp service (frontend)
  webapp:
    build:
      context: .
      dockerfile: ./docker/webapp.Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    network_mode: "host"
    ports:
      - "5000:5000"
    volumes:
      - ./webapp:/app/webapp
    environment:
      - NODE_ENV=${NODE_ENV:-development}

  # Matcher service
  matcher:
    build:
      context: .
      dockerfile: ./docker/matcher.Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    network_mode: "host"
    volumes:
      - ./services/matcher:/app/services/matcher
      - ./.env:/app/services/matcher/.env

networks:
  koord_net:
    driver: bridge

volumes:
  pgdata:
