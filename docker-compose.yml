services:
  # ---------------------------------------------------------------------------
  # Data plane: self-hosted Postgres + Hasura.
  # SECURITY: both are bound to 127.0.0.1 ONLY. Nothing here is reachable from
  # the internet or the LAN. They talk to each other over the private
  # `koord_net` bridge. Do NOT change the host binds to 0.0.0.0 without putting
  # a reverse proxy + TLS + firewall in front (see docs/INFRA.md).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.8-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-koordinator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-koordinator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # host-only, non-default port (5432 is taken by another project)
      - "127.0.0.1:5434:5432"
    networks:
      - koord_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koordinator} -d ${POSTGRES_DB:-koordinator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  hasura:
    image: hasura/graphql-engine:v2.44.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - koord_net
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER:-koordinator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koordinator}
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://${POSTGRES_USER:-koordinator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koordinator}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:?set HASURA_ADMIN_SECRET in .env}
      # JWT auth: the ES256 public key that verifies webapp-signed sessions.
      # Kept in the gitignored .env (derived from MY_APP_KEYS by
      # scripts/gen-jwt-secret.mjs) so no key material lives in a committed file.
      HASURA_GRAPHQL_JWT_SECRET: '${HASURA_GRAPHQL_JWT_SECRET:?run scripts/gen-jwt-secret.mjs to derive it into .env}'
      # Requests with no JWT get this role (public, read-only browsing).
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      # Console is safe to enable because the port is bound to localhost only.
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      # Hardening: no verbose internal errors, no anonymous role, no phone-home.
      HASURA_GRAPHQL_DEV_MODE: "false"
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, webhook-log, websocket-log"
      # For prod, set KOORD_CORS_DOMAIN in .env to your site origin (https://your.domain)
      HASURA_GRAPHQL_CORS_DOMAIN: '${KOORD_CORS_DOMAIN:-http://localhost:5533, http://localhost:5000}'

  # ---------------------------------------------------------------------------
  # Migration runner. Applies db/migrations/*.sql to the local Postgres above.
  # To load the April data dump, use scripts/db-init.sh (it restores first,
  # THEN migrates). A bare `docker compose up` on an EMPTY volume will instead
  # build the schema fresh from migrations — fine for a blank start.
  # ---------------------------------------------------------------------------
  migrations:
    build:
      context: .
      dockerfile: ./docker/migrations.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-koordinator}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koordinator}
    networks:
      - koord_net
    volumes:
      - ./db:/app/db

  # ---------------------------------------------------------------------------
  # App services. Profiles:
  #   (none)  postgres/hasura/migrations/matcher — always on
  #   dev     webapp dev server in a container (most dev happens on the host
  #           via `cd webapp && bun run dev` instead)
  #   prod    built webapp (adapter-node) + telegram bot
  # Prod bring-up:  docker compose --profile prod up -d --build
  # TLS: handled by the VPS's global Caddy, reverse-proxying the domain to
  # 127.0.0.1:5533 (see docs/INFRA.md). Nothing here binds beyond localhost.
  # ---------------------------------------------------------------------------

  # Webapp — dev container (optional)
  webapp:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: ./docker/webapp.Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    network_mode: "host"
    volumes:
      - ./webapp:/app/webapp
    environment:
      - NODE_ENV=development

  # Webapp — production build (adapter-node), served on 127.0.0.1:5533
  webapp-prod:
    profiles: ["prod"]
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/webapp.Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    network_mode: "host"
    volumes:
      - ./webapp:/app/webapp
    environment:
      - NODE_ENV=production

  # Matcher — the threshold-resolution heartbeat. Always on.
  matcher:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/matcher.Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    network_mode: "host"
    volumes:
      - ./services/matcher:/app/services/matcher
      - ./.env:/app/services/matcher/.env

  # Telegram bot — needs TELEGRAM_BOT_TOKEN in services/telegram/.env
  telegram:
    profiles: ["prod", "telegram"]
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/telegram.Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    network_mode: "host"
    volumes:
      - ./services/telegram:/app/services/telegram

networks:
  koord_net:
    driver: bridge

volumes:
  pgdata:
